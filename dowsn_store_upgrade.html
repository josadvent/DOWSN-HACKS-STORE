<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOWSN STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
body {margin:0;background:linear-gradient(135deg,#0b0b0f,#111);font-family:'Poppins',sans-serif;color:white;}
.header{text-align:center;padding:30px;}
.title{font-family:'Orbitron';font-size:42px;animation:glow 2s infinite alternate;}
@keyframes glow{from{text-shadow:0 0 10px #ff00ff;}to{text-shadow:0 0 30px #ff00ff;}}
.main-btn{display:block;margin:20px auto;width:260px;padding:14px;border-radius:30px;border:2px solid #ff00ff;color:#ff00ff;text-align:center;text-decoration:none;transition:0.3s;}
.main-btn:hover{background:#ff00ff;color:white;box-shadow:0 0 20px #ff00ff;}
.filter{text-align:center;}
.filter button{margin:5px;padding:10px 20px;border-radius:20px;border:none;background:#1a1a1f;color:white;cursor:pointer;transition:0.3s;}
.filter button:hover{transform:scale(1.1);}
.filter .active{background:linear-gradient(45deg,#ff00ff,#9900ff);}
.container{display:flex;flex-wrap:wrap;justify-content:center;}
.card{width:300px;margin:15px;padding:15px;border-radius:20px;background:rgba(17,17,17,0.8);backdrop-filter:blur(10px);box-shadow:0 0 20px #ff00ff30;transition:0.3s;}
.card:hover{transform:scale(1.05);box-shadow:0 0 25px #ff00ff;}
.card img{width:100%;border-radius:10px;}
.price{color:#ff00ff;}
</style>
</head>

<body>

<div class="header">
<div class="title">DOWSN STORE</div>
</div>

<a href="#" class="main-btn">⭐ LIHAT TESTIMONI →</a>

<div class="filter">
<button onclick="filterGame('all', this)" class="active">ALL</button>
<button onclick="filterGame('ff', this)">FREE FIRE</button>
<button onclick="filterGame('ml', this)">MOBILE LEGENDS</button>
</div>

<div class="container">

<div class="card ff" data-aos="fade-up">
<img src="https://via.placeholder.com/300x200?text=FREE+FIRE">
<h3>HG CHEAT</h3>
<p>7 Hari - <span class="price">70K</span></p>
</div>

<div class="card ml" data-aos="fade-up">
<img src="https://via.placeholder.com/300x200?text=ML">
<h3>ML MOD</h3>
<p>7 Hari - <span class="price">80K</span></p>
</div>

</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
function filterGame(game, el){
let cards=document.querySelectorAll(".card");
let buttons=document.querySelectorAll(".filter button");
buttons.forEach(btn=>btn.classList.remove("active"));
el.classList.add("active");
cards.forEach(card=>{
if(game==="all"){card.style.display="block";}
else{card.style.display=card.classList.contains(game)?"block":"none";}
});
}
</script>

</body>
</html>
